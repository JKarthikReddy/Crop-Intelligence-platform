# ── LSTM Yield Model Configuration ───────────────────────────────
# All hyperparameters live here — never hardcoded in scripts.
# input_size must match the feature dimension from feature_timeseries.py
# (3 base × 4 = 12 enhanced features).

model:
  input_size: 12
  hidden_size: 64
  num_layers: 2
  dropout: 0.1

training:
  epochs: 200
  batch_size: 32
  learning_rate: 0.001
  test_split: 0.2
  random_seed: 42

versioning:
  current: "v1"
