# ── XGBoost Yield Model Configuration ────────────────────────────
# All hyperparameters live here — never hardcoded in scripts.
# Version bump → new model artifact, never overwrite.

model:
  n_estimators: 400
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  objective: "reg:squarederror"
  random_state: 42

training:
  test_size: 0.2
  early_stopping_rounds: 50
  target_column: "target_yield"

versioning:
  current: "v1"
