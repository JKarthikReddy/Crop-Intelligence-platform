services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: crop_backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    env_file:
      - ../backend/.env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgis/postgis:15-3.3
    container_name: crop_postgres
    environment:
      POSTGRES_USER: crop
      POSTGRES_PASSWORD: crop
      POSTGRES_DB: cropdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: crop_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
